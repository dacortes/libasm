name: Run test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    name: Build and Test
    steps:
  
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Install dependencies
      run: |
       sudo apt-get update
       sudo apt-get install -y \
       gcc \
       nasm && echo "[SUCCESS] Download and install dependencies"
    
    - name: test compare
      run: |
       echo "Init test with makefile test"
       make test
       
       if [ ! -f test ]; then 
         printf "[ERROR]: Failed to create binary test\n"
         if [ "${{ github.event_name }}" = "pull_request" ]; then
           printf "❌ Pull Request failed: Binary not created\n"
         fi
         exit 1
       else 
         printf "[SUCCESS] binary test created\n"
       fi
       
       chmod +x test
       
       if ! ./test; then
         printf "[ERROR]: Test execution failed\n"
         if [ "${{ github.event_name }}" = "pull_request" ]; then
           printf "❌ Pull Request failed: Tests didn't pass\n"
         fi
         exit 1
       fi
       
       printf "✅ All tests passed successfully\n"
